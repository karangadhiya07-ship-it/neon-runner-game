<!DOCTYPE html>

<html>
<head>
  <title>Neon Runner 3D Pro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="hud">
  <b>NEON RUNNER 3D PRO</b><br>
  Score: <span id="score">0</span><br>
  Coins: <span id="coins">0</span><br>
  High Score: <span id="high">0</span>
</div>

<div id="menu">
  <h1>NEON RUNNER 3D</h1>
  <p>Cyberpunk city runner with coins, jumps and neon obstacles.</p>
  <button onclick="startGame()">START GAME</button>
  <p class="small">PC: ← → Move | SPACE Jump<br>Mobile: Swipe Left / Right / Up</p>
</div>

<div id="gameOver" class="hide">
  <h1>GAME OVER</h1>
  <p id="final"></p>
  <button onclick="startGame()">RESTART</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script src="game.js"></script>

</body>
</html>

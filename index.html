<!DOCTYPE html>
<html>
<head>
<title>3D Neon Runner</title>
<style>
body{margin:0;overflow:hidden;background:#050014;font-family:Arial;color:white}
#ui{position:fixed;top:15px;left:15px;z-index:10;font-size:18px}
#menu,#shop,#over{position:fixed;inset:0;background:#050014ee;z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
button{padding:14px 25px;margin:8px;border:0;border-radius:10px;background:#00ffd5;color:#000;font-weight:bold;font-size:16px}
.card{border:1px solid #00ffd5;padding:15px;margin:8px;border-radius:12px;width:230px}
.hide{display:none!important}
</style>
</head>
<body>

<div id="ui">
Score: <span id="score">0</span><br>
Coins: <span id="coins">0</span><br>
Character: <span id="charName">Neon Boy</span>
</div>

<div id="menu">
<h1>3D Neon Runner</h1>
<button onclick="startGame()">PLAY</button>
<button onclick="openShop()">SHOP / UNLOCK</button>
<p>PC: ← → Move | SPACE Jump<br>Mobile: Swipe Left/Right/Up</p>
</div>

<div id="shop" class="hide">
<h2>Unlock Characters</h2>
<div id="shopItems"></div>
<button onclick="closeShop()">BACK</button>
</div>

<div id="over" class="hide">
<h1>GAME OVER</h1>
<h2 id="finalScore"></h2>
<button onclick="startGame()">RESTART</button>
<button onclick="backMenu()">MENU</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
let scene,camera,renderer,player,road;
let lane=0,targetX=0,vy=0,jumping=false;
let obstacles=[],coinObjs=[];
let running=false,score=0,speed=0.28;
let totalCoins=Number(localStorage.getItem("coins")||0);
let selected=localStorage.getItem("selected")||"Neon Boy";
let unlocked=JSON.parse(localStorage.getItem("unlocked")||'["Neon Boy"]');

const chars=[
{name:"Neon Boy",price:0,color:0x00ffd5},
{name:"Cyber Ninja",price:100,color:0xff00ff},
{name:"Gold Robot",price:250,color:0xffd700},
{name:"Space Girl",price:500,color:0x8a2be2}
];

document.getElementById("coins").innerText=totalCoins;
document.getElementById("charName").innerText=selected;

function init(){
scene=new THREE.Scene();
scene.background=new THREE.Color(0x050014);
camera=new THREE.PerspectiveCamera(70,innerWidth/innerHeight,.1,1000);
camera.position.set(0,5,8);
camera.lookAt(0,1,0);

renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

let light=new THREE.DirectionalLight(0xffffff,1);
light.position.set(0,10,10);
scene.add(light);
scene.add(new THREE.AmbientLight(0x5555ff,1));

let roadGeo=new THREE.BoxGeometry(7,.2,200);
let roadMat=new THREE.MeshStandardMaterial({color:0x111133});
road=new THREE.Mesh(roadGeo,roadMat);
road.position.z=-70;
scene.add(road);

for(let i=0;i<60;i++){
let line=new THREE.Mesh(
new THREE.BoxGeometry(.08,.05,2),
new THREE.MeshBasicMaterial({color:0x00ffd5})
);
line.position.set(i%2? -2.3:2.3,.2,-i*4);
scene.add(line);
}
}
init();

function makePlayer(){
if(player)scene.remove(player);
let ch=chars.find(c=>c.name===selected);
player=new THREE.Mesh(
new THREE.BoxGeometry(1,1.5,1),
new THREE.MeshStandardMaterial({color:ch.color,emissive:ch.color,emissiveIntensity:.4})
);
player.position.set(0,1,3);
scene.add(player);
}

function startGame(){
document.getElementById("menu").classList.add("hide");
document.getElementById("shop").classList.add("hide");
document.getElementById("over").classList.add("hide");
obstacles.forEach(o=>scene.remove(o)); coinObjs.forEach(c=>scene.remove(c));
obstacles=[];coinObjs=[];score=0;speed=.28;lane=0;targetX=0;vy=0;jumping=false;
makePlayer();
running=true;
}

function backMenu(){running=false;document.getElementById("over").classList.add("hide");document.getElementById("menu").classList.remove("hide")}

function spawnObstacle(){
let o=new THREE.Mesh(
new THREE.BoxGeometry(1.2,1.2,1.2),
new THREE.MeshStandardMaterial({color:0xff0055,emissive:0xff0055,emissiveIntensity:.6})
);
o.position.set([-2.4,0,2.4][Math.floor(Math.random()*3)],.8,-80);
scene.add(o);obstacles.push(o);
}

function spawnCoin(){
let c=new THREE.Mesh(
new THREE.SphereGeometry(.35,24,24),
new THREE.MeshStandardMaterial({color:0xffd700,emissive:0xffd700,emissiveIntensity:.8})
);
c.position.set([-2.4,0,2.4][Math.floor(Math.random()*3)],1.2,-80);
scene.add(c);coinObjs.push(c);
}

function hit(a,b){
return Math.abs(a.position.x-b.position.x)<1 && Math.abs(a.position.z-b.position.z)<1 && Math.abs(a.position.y-b.position.y)<1.4;
}

function gameOver(){
running=false;
document.getElementById("finalScore").innerText="Score: "+Math.floor(score);
document.getElementById("over").classList.remove("hide");
}

function animate(){
requestAnimationFrame(animate);

if(running){
score+=.1;
speed+=.00015;
document.getElementById("score").innerText=Math.floor(score);

player.position.x+=(targetX-player.position.x)*.2;
vy-=.035;
player.position.y+=vy;
if(player.position.y<=1){player.position.y=1;vy=0;jumping=false}
player.rotation.y+=.04;

if(Math.random()<.018)spawnObstacle();
if(Math.random()<.025)spawnCoin();

obstacles.forEach(o=>{
o.position.z+=speed;
o.rotation.y+=.05;
if(hit(player,o))gameOver();
});
coinObjs.forEach(c=>{
c.position.z+=speed;
c.rotation.y+=.1;
if(hit(player,c)){
scene.remove(c);
c.collected=true;
totalCoins++;
localStorage.setItem("coins",totalCoins);
document.getElementById("coins").innerText=totalCoins;
}
});
obstacles=obstacles.filter(o=>o.position.z<8);
coinObjs=coinObjs.filter(c=>c.position.z<8&&!c.collected);
}
renderer.render(scene,camera);
}
animate();

function moveLeft(){lane=Math.max(-1,lane-1);targetX=lane*2.4}
function moveRight(){lane=Math.min(1,lane+1);targetX=lane*2.4}
function jump(){if(!jumping){vy=.65;jumping=true}}

addEventListener("keydown",e=>{
if(e.key==="ArrowLeft")moveLeft();
if(e.key==="ArrowRight")moveRight();
if(e.code==="Space")jump();
});

let sx=0,sy=0;
addEventListener("touchstart",e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY});
addEventListener("touchend",e=>{
let dx=e.changedTouches[0].clientX-sx;
let dy=e.changedTouches[0].clientY-sy;
if(Math.abs(dx)>Math.abs(dy)){dx>30?moveRight():dx<-30&&moveLeft()}
else if(dy<-30)jump();
});

function openShop(){
document.getElementById("menu").classList.add("hide");
document.getElementById("shop").classList.remove("hide");
renderShop();
}
function closeShop(){
document.getElementById("shop").classList.add("hide");
document.getElementById("menu").classList.remove("hide");
}
function renderShop(){
let box=document.getElementById("shopItems");box.innerHTML="";
chars.forEach(ch=>{
let owned=unlocked.includes(ch.name);
let div=document.createElement("div");
div.className="card";
div.innerHTML=`<h3>${ch.name}</h3><p>${owned?"Unlocked":"Price: "+ch.price+" coins"}</p>`;
let btn=document.createElement("button");
btn.innerText=owned?(selected===ch.name?"Selected":"Select"):"Unlock";
btn.onclick=()=>{
if(owned){selected=ch.name;localStorage.setItem("selected",selected)}
else if(totalCoins>=ch.price){totalCoins-=ch.price;unlocked.push(ch.name);localStorage.setItem("coins",totalCoins);localStorage.setItem("unlocked",JSON.stringify(unlocked));selected=ch.name;localStorage.setItem("selected",selected)}
document.getElementById("coins").innerText=totalCoins;
document.getElementById("charName").innerText=selected;
renderShop();
};
div.appendChild(btn);box.appendChild(div);
});
}
</script>
</body>
</html>
